- name: configure frontend server
  hosts: frontend
  become: yes
  tasks:
  - name: enable nginx 1.24
    command: dnf module enable nginx:1.24 -y
  - name: install nginx
    package:
      name: nginx
      state: present
  - name: remove html directory
    file:
      path: /usr/share/nginx/html/
      state: absent
  - name: delete frontend.zip in tmp directory
    file:
      path: /tmp/frontend.zip
      state: absent
  - name: create html directory
    file:
      path: /usr/share/nginx/html/
      state: directory
  - name: Ensure tar and python driver are installed
    ansible.builtin.package:
      name:
        - tar
      state: present
  - name: Ensure python3-pip is available on frontend host
    ansible.builtin.package:
      name: python3-pip
      state: present

  - name: Install PyMySQL driver using pip3 instead of dnf
    ansible.builtin.pip:
      name: pymysql
      state: present

  - name: download frontend
    get_url:
      url: https://raw.githubusercontent.com/daws-90s/expense-documentation/refs/heads/main/artifacts/expense-frontend-v3.tar.gz
      dest: /tmp/frontend.zip
  - name: unzip frontend
    unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html/
      remote_src: yes
  - name: remove nginx default conf
    file:
      path: /etc/nginx/nginx.conf
      state: absent
  - name: copy nginx conf
    template:
      src: nginx.conf.j2
      dest: /etc/nginx/nginx.conf
  - name: restart and enable frontend
    service:
      name: nginx
      state: restarted
      enabled: yes