- name: configuring database servers
  hosts: database
  become: yes
  tasks:
    - name: installing mysql package
      package:
        name: mysql-server
        state: present
    - name: enable and start the mysql server
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: true

    
    - name: setup root user_password
      ansible.builtin.shell: |
        mysql_secure_installation --set-root-pass ExpenseApp@1
    
         